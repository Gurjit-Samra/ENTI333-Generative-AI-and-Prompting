<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Timer</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(8, 13, 30, 0.72);
      --panel-border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --primary: #a78bfa;
      --primary-2: #38bdf8;
      --danger: #fb7185;
      --success: #34d399;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 18%, rgba(167, 139, 250, 0.24), transparent 18%),
        radial-gradient(circle at 84% 72%, rgba(56, 189, 248, 0.18), transparent 20%),
        radial-gradient(circle at 52% 8%, rgba(244, 114, 182, 0.12), transparent 18%),
        #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 48px);
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
    }

    body::before {
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.92) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(186, 230, 253, 0.72) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(221, 214, 254, 0.75) 0 1px, transparent 1.4px);
      background-size: 90px 90px, 145px 145px, 220px 220px;
      background-position: 12px 18px, 44px 70px, 110px 36px;
      opacity: 0.42;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 48%, rgba(255, 255, 255, 0.075) 49%, transparent 51% 100%),
        radial-gradient(circle at 50% 50%, transparent 0, rgba(2, 6, 23, 0.74) 76%);
      opacity: 0.5;
      z-index: -1;
    }

    .app {
      width: min(100%, 1180px);
      min-height: min(860px, calc(100vh - 48px));
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.1fr);
      align-items: center;
      gap: clamp(24px, 5vw, 72px);
      position: relative;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 8%;
      z-index: -1;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.13), transparent 62%);
      filter: blur(18px);
      pointer-events: none;
    }

    .hero {
      text-align: left;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(167, 139, 250, 0.16);
      color: #ddd6fe;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 20px;
      box-shadow: 0 0 24px rgba(167, 139, 250, 0.16);
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 18px var(--success);
    }

    h1 {
      font-size: clamp(3.2rem, 8vw, 6.8rem);
      letter-spacing: -0.08em;
      line-height: 0.9;
      margin-bottom: 20px;
      text-shadow: 0 0 36px rgba(167, 139, 250, 0.18);
    }

    .subtitle {
      max-width: 520px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.65;
    }

    .timer-panel {
      width: min(100%, 540px);
      justify-self: center;
      padding: clamp(22px, 4vw, 36px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 34px;
      box-shadow: var(--shadow), 0 0 70px rgba(56, 189, 248, 0.08);
      backdrop-filter: blur(22px);
    }

    .timer-ring {
      position: relative;
      width: min(70vw, 320px);
      height: min(70vw, 320px);
      margin: 0 auto 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--primary) 0deg, rgba(255, 255, 255, 0.13) 0deg);
      transition: background 0.4s ease;
      box-shadow: 0 0 45px rgba(167, 139, 250, 0.18), inset 0 0 32px rgba(255, 255, 255, 0.04);
    }

    .timer-ring::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.09), transparent 26%),
        linear-gradient(145deg, rgba(3, 7, 18, 0.98), rgba(15, 23, 42, 0.92));
      box-shadow: inset 0 0 38px rgba(167, 139, 250, 0.08);
    }

    .timer-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(3.2rem, 14vw, 4.8rem);
      font-weight: 850;
      letter-spacing: -0.08em;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      width: 100%;
      padding: 13px 10px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(15, 23, 42, 0.62);
      color: var(--text);
      font-size: 1rem;
      font-weight: 750;
      text-align: center;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus {
      border-color: rgba(56, 189, 248, 0.95);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
      background: rgba(15, 23, 42, 0.88);
    }

    .quick-actions,
    .controls {
      display: grid;
      gap: 10px;
    }

    .quick-actions {
      grid-template-columns: repeat(3, 1fr);
      margin-bottom: 18px;
    }

    .controls {
      grid-template-columns: 1fr 1fr;
    }

    button {
      font: inherit;
    }

    .preset,
    .btn {
      border-radius: 16px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .preset {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      padding: 11px;
    }

    .preset:hover,
    .btn:hover {
      transform: translateY(-1px);
    }

    .btn {
      min-height: 52px;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #c084fc, #38bdf8);
      color: #020617;
      box-shadow: 0 14px 34px rgba(56, 189, 248, 0.24), 0 0 26px rgba(192, 132, 252, 0.16);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn-danger {
      grid-column: 1 / -1;
      background: rgba(251, 113, 133, 0.14);
      color: #fecdd3;
      border: 1px solid rgba(251, 113, 133, 0.24);
    }

    .hidden {
      display: none;
    }

    .credit-text {
      width: 100%;
      max-width: 470px;
      margin: 24px auto 0;
      text-align: center;
      color: var(--text);
      font-size: clamp(0.84rem, 2.2vw, 0.96rem);
      line-height: 1.55;
      font-weight: 650;
      text-wrap: balance;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.8), 0 0 24px rgba(56, 189, 248, 0.3);
    }

    .customizer {
      margin-top: 24px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
    }

    .customizer-title {
      margin-bottom: 14px;
      color: #ddd6fe;
      font-size: 0.82rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .customizer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .customizer .field input {
      padding: 11px 8px;
    }

    .color-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .color-dot {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 14px currentColor;
    }

    .star-particle {
      position: fixed;
      left: 0;
      top: 0;
      width: 8px;
      height: 8px;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, -50%);
      animation: starBurst var(--burst-speed, 2s) ease-out forwards;
      color: var(--star-color, #fff);
      filter: drop-shadow(0 0 8px currentColor);
    }

    .star-particle::before {
      content: "★";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: var(--star-size, 13px);
      line-height: 1;
    }

    @keyframes starBurst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.35) rotate(0deg);
      }

      65% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.05) rotate(220deg);
      }
    }

    @media (max-width: 860px) {
      body {
        align-items: flex-start;
      }

      .app {
        min-height: auto;
        grid-template-columns: 1fr;
        gap: 26px;
      }

      .hero {
        text-align: center;
        padding: 12px 4px 0;
      }

      .subtitle {
        margin: 0 auto;
      }

      .timer-panel {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .timer-panel {
        padding: 20px;
        border-radius: 24px;
      }

      .inputs,
      .quick-actions,
      .customizer-grid {
        gap: 8px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .btn-danger {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Space Timer App">
    <section class="hero">
      <div class="badge" aria-live="polite">
        <span class="badge-dot"></span>
        <span id="modeLabel">Ready</span>
      </div>
      <h1>Timer</h1>
      <p class="subtitle">Set a custom countdown, use a preset, and launch a colorful star burst anywhere you click across the cosmic background.</p>
    </section>

    <section class="timer-panel">
      <div class="timer-ring" id="timerRing" role="timer" aria-live="polite">
        <div class="timer-content">
          <div class="time" id="timeDisplay">25:00</div>
        </div>
      </div>

      <div class="inputs" aria-label="Timer duration inputs">
        <div class="field">
          <label for="hours">Hours</label>
          <input id="hours" type="text" value="0" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="minutes">Minutes</label>
          <input id="minutes" type="text" value="25" inputmode="numeric" />
        </div>
        <div class="field">
          <label for="seconds">Seconds</label>
          <input id="seconds" type="text" value="0" inputmode="numeric" />
        </div>
      </div>

      <div class="quick-actions" aria-label="Preset timers">
        <button class="preset" data-minutes="5">5 min</button>
        <button class="preset" data-minutes="15">15 min</button>
        <button class="preset" data-minutes="25">25 min</button>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startPauseBtn">Start</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
        <button class="btn btn-danger hidden" id="clearBtn">Clear Timer</button>
      </div>

      <p class="credit-text">This timer app was made by Gurjit Samra as a project for class at the Haskayne School of Business, University of Calgary.</p>

      <div class="customizer" aria-label="Star firework customization options">
        <p class="customizer-title">Star Firework Options</p>
        <div class="customizer-grid">
          <div class="field">
            <label for="starCountInput">Stars</label>
            <input id="starCountInput" type="text" value="22" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="burstSpeedInput">Speed</label>
            <input id="burstSpeedInput" type="text" value="2000" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="spreadInput">Spread</label>
            <input id="spreadInput" type="text" value="150" inputmode="numeric" />
          </div>
        </div>
        <div class="color-row" id="colorPreview" aria-label="Current star colors"></div>
      </div>
    </section>
  </main>

  <script>
    /*
      Star firework customization:
      - Change STAR_COLORS to control the burst colors.
      - Change starCount or the Stars input to add/remove stars per click.
      - Change burstSpeedMs or the Speed input to make the animation faster or slower.
      - Change MIN_DISTANCE and maxDistance or the Spread input to control how far stars travel.
    */
    const STAR_COLORS = ["#f0abfc", "#93c5fd", "#67e8f9", "#fde68a", "#86efac", "#fda4af"];
    let starCount = 22;
    let burstSpeedMs = 2000;
    const MIN_DISTANCE = 50;
    let maxDistance = 150;

    const hoursInput = document.getElementById("hours");
    const minutesInput = document.getElementById("minutes");
    const secondsInput = document.getElementById("seconds");
    const timeDisplay = document.getElementById("timeDisplay");
    const modeLabel = document.getElementById("modeLabel");
    const timerRing = document.getElementById("timerRing");
    const startPauseBtn = document.getElementById("startPauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearBtn = document.getElementById("clearBtn");
    const presetButtons = document.querySelectorAll(".preset");
    const starCountInput = document.getElementById("starCountInput");
    const burstSpeedInput = document.getElementById("burstSpeedInput");
    const spreadInput = document.getElementById("spreadInput");
    const colorPreview = document.getElementById("colorPreview");

    let totalSeconds = 25 * 60;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let isRunning = false;

    function clamp(value, min, max) {
      const number = Number(value);
      if (Number.isNaN(number)) return min;
      return Math.min(Math.max(Math.floor(number), min), max);
    }

    function createStarBurst(x, y) {
      for (let i = 0; i < starCount; i += 1) {
        const star = document.createElement("span");
        const angle = Math.random() * Math.PI * 2;
        const distance = MIN_DISTANCE + Math.random() * (maxDistance - MIN_DISTANCE);
        const starX = Math.cos(angle) * distance;
        const starY = Math.sin(angle) * distance;
        const color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
        const size = 9 + Math.random() * 10;

        star.className = "star-particle";
        star.style.left = `${x}px`;
        star.style.top = `${y}px`;
        star.style.setProperty("--x", `${starX}px`);
        star.style.setProperty("--y", `${starY}px`);
        star.style.setProperty("--star-color", color);
        star.style.setProperty("--star-size", `${size}px`);
        star.style.setProperty("--burst-speed", `${burstSpeedMs}ms`);

        document.body.appendChild(star);

        window.setTimeout(() => {
          star.remove();
        }, burstSpeedMs);
      }
    }

    function getInputSeconds() {
      const hours = Math.max(0, Number(hoursInput.value) || 0);
      const minutes = Math.max(0, Number(minutesInput.value) || 0);
      const seconds = Math.max(0, Number(secondsInput.value) || 0);

      return Math.floor(hours * 3600 + minutes * 60 + seconds);
    }

    function formatTime(seconds) {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;

      if (hrs > 0) {
        return `${String(hrs).padStart(2, "0")}:${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function updateProgressRing() {
      const progress = totalSeconds === 0 ? 0 : (remainingSeconds / totalSeconds) * 360;
      timerRing.style.background = `conic-gradient(var(--primary) ${progress}deg, rgba(255, 255, 255, 0.13) ${progress}deg)`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      updateProgressRing();
    }

    function setInputsFromSeconds(seconds) {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;

      hoursInput.value = hrs;
      minutesInput.value = mins;
      secondsInput.value = secs;
    }

    function syncTimerFromInputs() {
      totalSeconds = getInputSeconds();
      remainingSeconds = totalSeconds;
      updateDisplay();
      clearBtn.classList.toggle("hidden", totalSeconds === 0);
    }

    function setRunningState(running) {
      isRunning = running;
      startPauseBtn.textContent = running ? "Pause" : "Start";
      modeLabel.textContent = running ? "Running" : "Ready";

      [hoursInput, minutesInput, secondsInput, ...presetButtons].forEach((element) => {
        element.disabled = running;
        element.style.opacity = running ? "0.55" : "1";
        element.style.cursor = running ? "not-allowed" : "pointer";
      });
    }

    function startTimer() {
      if (isRunning) return;

      if (remainingSeconds <= 0) {
        syncTimerFromInputs();
      }

      if (remainingSeconds <= 0) {
        modeLabel.textContent = "Needs Time";
        return;
      }

      setRunningState(true);

      timerId = setInterval(() => {
        remainingSeconds -= 1;
        updateDisplay();

        if (remainingSeconds <= 0) {
          clearInterval(timerId);
          timerId = null;
          setRunningState(false);
          modeLabel.textContent = "Complete";
          startPauseBtn.textContent = "Start Again";
          timerRing.style.background = "conic-gradient(var(--success) 360deg, rgba(255, 255, 255, 0.13) 360deg)";
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerId);
      timerId = null;
      setRunningState(false);
      modeLabel.textContent = "Paused";
    }

    function resetTimer() {
      clearInterval(timerId);
      timerId = null;
      remainingSeconds = totalSeconds;
      updateDisplay();
      setRunningState(false);
      modeLabel.textContent = "Ready";
    }

    function clearTimer() {
      clearInterval(timerId);
      timerId = null;
      totalSeconds = 0;
      remainingSeconds = 0;
      setInputsFromSeconds(0);
      updateDisplay();
      setRunningState(false);
      modeLabel.textContent = "Ready";
      clearBtn.classList.add("hidden");
    }

    function renderColorPreview() {
      colorPreview.innerHTML = "";

      STAR_COLORS.forEach((color) => {
        const dot = document.createElement("span");
        dot.className = "color-dot";
        dot.style.background = color;
        dot.style.color = color;
        colorPreview.appendChild(dot);
      });
    }

    function updateFireworkOptions() {
      starCount = clamp(starCountInput.value, 5, 80);
      burstSpeedMs = clamp(burstSpeedInput.value, 300, 5000);
      maxDistance = clamp(spreadInput.value, 40, 300);
    }

    document.addEventListener("click", (event) => {
      createStarBurst(event.clientX, event.clientY);
    });

    startPauseBtn.addEventListener("click", () => {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener("click", resetTimer);
    clearBtn.addEventListener("click", clearTimer);

    [hoursInput, minutesInput, secondsInput].forEach((input) => {
      input.addEventListener("input", () => {
        if (!isRunning) {
          syncTimerFromInputs();
          modeLabel.textContent = "Ready";
        }
      });
    });

    presetButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const minutes = Number(button.dataset.minutes);
        totalSeconds = minutes * 60;
        remainingSeconds = totalSeconds;
        setInputsFromSeconds(totalSeconds);
        updateDisplay();
        clearBtn.classList.remove("hidden");
        modeLabel.textContent = "Ready";
      });
    });

    [starCountInput, burstSpeedInput, spreadInput].forEach((input) => {
      input.addEventListener("input", updateFireworkOptions);
    });

    renderColorPreview();
    updateFireworkOptions();
    syncTimerFromInputs();
  </script>
</body>
</html>
